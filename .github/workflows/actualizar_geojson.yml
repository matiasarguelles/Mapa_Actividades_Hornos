name: Actualizar GeoJSON de Actividades

on:
  workflow_dispatch:   # disparo manual o desde Apps Script vía API

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerías
        run: |
          pip install geopandas pandas pyproj shapely requests

      - name: Correr script
        run: python scripts/generar_geojson.py

      - name: Commit y push del GeoJSON actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add actividades_live.geojson warnings.json
          git diff --cached --quiet || git commit -m "Auto: actualizar actividades_live.geojson"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
